---
name: Deploy Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: true
        type: string

jobs:
  deploy-docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Deploy discord container
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: ${{ github.workspace }}/discord
          file: ${{ github.workspace }}/discord/Containerfile
          tags: |
            ghcr.io/yellow-corps/ibis-discord:latest
            ghcr.io/yellow-corps/ibis-discord:${{ inputs.version }}

      - name: Deploy exporter container
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: ${{ github.workspace }}/exporter
          file: ${{ github.workspace }}/exporter/Containerfile
          tags: |
            ghcr.io/yellow-corps/ibis-exporter:latest
            ghcr.io/yellow-corps/ibis-exporter:${{ inputs.version }}

      - name: Deploy shopify container
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: ${{ github.workspace }}/shopify
          file: ${{ github.workspace }}/shopify/Containerfile
          tags: |
            ghcr.io/yellow-corps/ibis-shopify:latest
            ghcr.io/yellow-corps/ibis-shopify:${{ inputs.version }}
