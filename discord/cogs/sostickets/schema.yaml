$schema: "http://json-schema.org/draft-07/schema#"
title: Prompts Configuration Schema
description: Schema for validating modal prompt configurations
type: object

properties:
  prompts:
    type: object
    description: Collection of prompt definitions.
    additionalProperties:
      type: object
      description: Individual prompt definitions.
      required:
        - title
        - items
        - assignees
      properties:
        title:
          type: string
          description: Title of the prompt.

        emoji:
          type: string
          description: Optional. Emoji prefix for the prompt.

        items:
          type: array
          description: List of items in the prompt.
          minItems: 1
          items:
            type: object
            required:
              - label
            properties:
              label:
                type: string
                description: Label text for the item.

              description:
                type: string
                description: Optional. Description or helper text.

              type:
                type: string
                enum:
                  - text
                  - paragraph
                  - select
                  - file
                  - note
                description: Optional. Type of item. Defaults to "text".

              required:
                type: boolean
                description: Optional. Whether the item is required. Defaults to `True`.

              options:
                type: array
                description: Options for select-type items
                items:
                  type: object
                  required:
                    - label
                  properties:
                    label:
                      type: string
                      description: Display text for the option.

                    emoji:
                      type: string
                      description: Optional. Emoji prefix for the option.

        followup:
          type: string
          description: Follow-up message to display after submission.

        assignees:
          type: array
          description: List of users or roles to assign to.
          items:
            type: object
            oneOf:
              - type: object
                required:
                  - user
                properties:
                  user:
                    type: string
                    description: Username to assign to.

                additionalProperties: false

              - type: object
                required:
                  - role
                properties:
                  role:
                    type: string
                    description: Role name to assign to.

                additionalProperties: false

        accent:
          type: string
          description: Hex color code for accent color in embed.
          pattern: "^#[0-9a-fA-F]{6}$"

required:
  - prompts

additionalProperties: false
