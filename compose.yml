name: ibis

services:
  discord:
    container_name: discord
    image: ghcr.io/yellow-corps/ibis-discord:latest
    build:
      context: ./discord
      dockerfile: ./Containerfile
      args:
        - WITH_OTEL=${WITH_OTEL+true}
      sbom: true
      provenance: true
    restart: unless-stopped
    environment:
      RED_TOKEN: "${RED_TOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${WITH_OTEL+http://grafana:4317}"
      OTEL_SERVICE_NAME: discord
    volumes:
      - type: volume
        source: discord-config
        target: /home/discord/.config/Red-DiscordBot
      - type: volume
        source: discord-data
        target: /home/discord/.local/share/Red-DiscordBot/data
    ports:
      - "8080:8080"

  shopify:
    container_name: shopify
    profiles:
      - shopify
    image: ghcr.io/yellow-corps/ibis-shopify:latest
    build:
      context: ./shopify
      dockerfile: ./Containerfile
      args:
        - WITH_OTEL=${WITH_OTEL+true}
      sbom: true
      provenance: true
    restart: unless-stopped
    environment:
      SHOPIFY_CLIENT_ID: "${SHOPIFY_CLIENT_ID}"
      SHOPIFY_CLIENT_SECRET: "${SHOPIFY_CLIENT_SECRET}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${WITH_OTEL+http://grafana:4317}"
      OTEL_SERVICE_NAME: shopify
    network_mode: "service:discord"

  ngrok:
    container_name: ngrok
    profiles:
      - shopify
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    command:
      - http
      - "--url=${NGROK_DOMAIN}"
      - "http://discord:8080"
    depends_on:
      - shopify

  exporter:
    container_name: exporter
    profiles:
      - exporter
    image: ghcr.io/yellow-corps/ibis-exporter:latest
    build:
      context: ./exporter
      dockerfile: ./Containerfile
      args:
        - WITH_OTEL=${WITH_OTEL+true}
      sbom: true
      provenance: true
    restart: unless-stopped
    environment:
      RED_TOKEN: "${RED_TOKEN}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${WITH_OTEL+http://grafana:4317}"
      OTEL_SERVICE_NAME: exporter
    network_mode: "service:discord"

  grafana:
    container_name: grafana
    profiles:
      - grafana
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    volumes:
      - grafana-data:/data
    ports:
      - "3000:3000"

volumes:
  discord-config:
  discord-data:
  grafana-data:
